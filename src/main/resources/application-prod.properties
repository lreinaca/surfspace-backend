spring.application.name=SurfSpace-App

# Configuraci?n segura para producci?n
# SIN INTERFAZ pero CON documentaci?n JSON en producci?n
springdoc.swagger-ui.path=/docs

# ? SIN interfaz visual
springdoc.swagger-ui.enabled=false

# ? PERO S? documentaci?n para herramientas
springdoc.api-docs.enabled=true

# Seguridad adicional - solo mostrar endpoints p?blicos
springdoc.paths-to-exclude=/admin/**, /internal/**

# Configuraci?n de Base de Datos (Render compatible)
# Render proporciona DATABASE_URL, pero Spring Boot necesita formato jdbc
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/surfspace}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:adminSS}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ss1234}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Configuraci?n de JPA/Hibernate para producci?n
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=false

# Puerto din?mico (Render asigna el puerto)
server.port=${PORT:8080}

# JWT Secret (obligatorio - se configura en Render)
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000
