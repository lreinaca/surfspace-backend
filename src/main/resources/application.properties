spring.application.name=SurfSpace-App
# Configuraciï¿½n bï¿½sica de OpenAPI (comï¿½n a todos los entornos)
springdoc.api-docs.path=/api-docs
# Ordena las operaciones por metodo HTTP (GET, POST, PUT, DELETE)
springdoc.swagger-ui.operationsSorter=method
# Ordena las etiquetas (controllers) alfabï¿½ticamente
springdoc.swagger-ui.tagsSorter=alpha 
# Habilita el boton - Try it out - para probar endpoints
springdoc.swagger-ui.tryItOutEnabled=true 
# Controla quï¿½ tan expandida aparece la documentaciï¿½n al cargar
springdoc.swagger-ui.doc-expansion=none
# Habilita/deshabilita completamente Swagger UI
springdoc.swagger-ui.disable-swagger-default-url=true
# Oculta los endpoints de Spring Boot Actuator
springdoc.show-actuator=false
#solo se documentarï¿½n los endpoints que estï¿½n bajo /api/....
springdoc.paths-to-match=/api/** 

# Configuraciï¿½n especï¿½fica para el entorno global
server.port=8080
spring.profiles.active=dev
spring.datasource.url=jdbc:mariadb://localhost:3306/surfspace?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=adminSS
spring.datasource.password=ss1234


#Configuracion de seguridad
jwt.secret=${JWT_SECRET}

# Token expiration (milliseconds) - 24 hours = 86_400_000 ms
jwt.expiration-ms=86400000






