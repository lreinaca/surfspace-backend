services:
  # Base de datos MariaDB/MySQL
  - type: pserv
    name: surfspace-db
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile.mariadb
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: rootpass
      - key: MYSQL_DATABASE
        value: surfspace
      - key: MYSQL_USER
        value: adminSS
      - key: MYSQL_PASSWORD
        value: ss1234
    disk:
      name: surfspace-db-data
      mountPath: /var/lib/mysql
      sizeGB: 1

  # Aplicación Spring Boot Backend
  - type: web
    name: surfspace-backend
    env: java
    plan: free
    buildCommand: "./gradlew clean build -x test"
    startCommand: "java -Dserver.port=$PORT -jar build/libs/SurfSpace-App-0.0.1-SNAPSHOT.jar"
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: surfspace-db
          property: connectionString
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mariadb://surfspace-db:3306/surfspace
      - key: SPRING_DATASOURCE_USERNAME
        value: adminSS
      - key: SPRING_DATASOURCE_PASSWORD
        value: ss1234

